<h1>Список пользователей</h1>

<div class="container">
  @if (isLoading()) {
    <div class="center">
      <mat-spinner/>
    </div>
  } @else {
    <div class="mat-elevation-z2">
      <table mat-table class="full-width-table" [dataSource]="users" aria-label="Таблица с пользователями">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Имя пользователя</th>
          <td mat-cell *matCellDef="let user">
            {{ user.name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let user">
            {{ user.email }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Действия</th>
          <td mat-cell *matCellDef="let user">
            <div class="actions-cell">
              <button
                matIconButton
                aria-label="Редактировать пользователя"
              >
                <mat-icon>edit</mat-icon>
              </button>

              <button
                mat-icon-button
                aria-label="Удалить пользователя"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }

  <button matButton="filled" [disabled]="isLoading()" class="add-button">Добавить пользователя</button>
</div>
