<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>Меню</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/users">
        <mat-icon matListItemIcon aria-hidden="true">people</mat-icon>
        <span matListItemTitle>Пользователи</span>
      </a>
      <a mat-list-item routerLink="/tasks">
        <mat-icon matListItemIcon aria-hidden="true">tasks</mat-icon>
        <span matListItemTitle>Задачи</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
        <button type="button" aria-label="Переключить боковое меню" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Иконка переключения бокового меню">menu</mat-icon>
        </button>
      }
      <span>Работа с пользователями и задачами</span>
    </mat-toolbar>
    <main class="container">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
